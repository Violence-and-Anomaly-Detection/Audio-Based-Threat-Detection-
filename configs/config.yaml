# Project Configuration

# Data Settings
data:
  raw_dir: "data/raw"              # Local or Drive raw data path
  processed_dir: "data/processed"  # Path for spectrograms (.npy)
  sample_rate: 32000               # SR required for PANNs
  n_mels: 64                       # Number of Mel bands
  window_size: 1024
  hop_size: 320
  segment_length: 10               # Analyze in 10-second windows
  chunk_size: 1                    # Sub-divide into 1-second chunks for temporal modeling

# Model Settings
model:
  backbone: "cnn14"                # PANNs architecture (CNN14, CNN10, etc.)
  temporal_model: "transformer"    # transformer or st-gcn
  hidden_dim: 2048                 # Backbone output dimension
  num_heads: 8
  num_layers: 4
  dropout: 0.1
  num_classes: 6                   # Fighting, Shooting, Stabbing, etc.

# Training Hyperparameters
training:
  batch_size: 16
  learning_rate: 0.0001
  epochs: 50
  patience: 10                     # Early stopping
  weight_decay: 1e-5
  scheduler_step: 10
  gamma: 0.5

# XAI & Logic
xai:
  method: "shap"                   # shap or integrated_gradients
  num_samples: 50

fuzzy:
  enabled: true
  severity_levels: ["Low", "Moderate", "High", "Critical"]

# Paths for Colab integration
colab:
  use_drive: true
  drive_root: "/content/drive/MyDrive/Research/Audio-Threat-Detection"
