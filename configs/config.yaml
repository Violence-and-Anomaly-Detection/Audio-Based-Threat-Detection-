# Project Settings
project_name: "Audio-Based-Threat-Detection"
version: "1.0.0"

# Audio Hyperparameters (Global for research consistency)
audio:
  sample_rate: 32000
  window_size: 1024
  hop_size: 320
  mel_bins: 64
  fmin: 50
  fmax: 14000

# Training Parameters
training:
  batch_size: 32
  learning_rate: 0.001
  epochs: 50
  
# --- PATHS (Colab Ready) ---
paths:
  # This path will be set automatically in Colab by your kagglehub code
  vsd_dataset: "/root/.cache/kagglehub/datasets/fangfangz/audio-based-violence-detection-dataset/versions/3"
  models_dir: "/content/drive/MyDrive/Research_Project/models"
  logs_dir: "/content/drive/MyDrive/Research_Project/logs"
